name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          VITE_TEABLE_BASE_URL:       ${{ secrets.VITE_TEABLE_BASE_URL }}
          VITE_TEABLE_TABLE_ID:       ${{ secrets.VITE_TEABLE_TABLE_ID }}
          VITE_TEABLE_TOKEN:          ${{ secrets.VITE_TEABLE_TOKEN }}
          VITE_TEABLE_USERS_TABLE_ID: ${{ secrets.VITE_TEABLE_USERS_TABLE_ID }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
